_target_: src.tasks.image_generation.models.imagen_module.ImaGenLitModule

net:
  _target_: src.backbones.ModelWrapper
  model:
    _target_: src.tasks.image_generation.models.backbones.UNet2DModelV2
    image_size: 32
    in_channels: 3
    model_channels: 128
    out_channels: 3
    num_res_blocks: 2
    attention_resolutions: [2]
    dropout: 0.2
    channel_mult: [1, 2, 3, 4]
    num_heads: 4
    num_head_channels: 64
    num_classes: 10
    add_attention: False
  shape: [3, 32, 32]
  cond_type: "label" # integer labels
  num_classes: 10

flow_model:
  _target_: src.flows.CFM
  _partial_: true
  cond_drop_prob: 0.2
  scheduler: null
  coupling_type: "ot-exact"

solver:
  _target_: src.flows.ode.ODESolver
  _partial_: true
  odeint_kwargs: {atol: 1e-5, rtol: 1e-5, method: "euler"}

# training
optimizer:
  _target_: torch.optim.Adam 
  _partial_: true
  lr: 0.0001
  weight_decay: 0.0

scheduler: null
  # _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  # _partial_: true
  # T_max: 200
  # eta_min: 0.00001

ema_decay: 0.9999

# inference
num_steps: 32
cfg_scale: 2.0

# compile model for faster training with pytorch 2.0
compile: true