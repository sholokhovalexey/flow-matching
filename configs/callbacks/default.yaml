defaults:
  - image_grid
  - model_checkpoint
  - early_stopping
  - model_summary
  - rich_progress_bar
  - _self_
  
image_grid:
  dirpath: ${paths.output_dir}/images
  filename: "images_{epoch:03d}"

model_checkpoint:
  dirpath: ${paths.output_dir}/ckpts
  filename: "model_{epoch:03d}"
  monitor: "val/loss"
  mode: "min"
  save_last: True
  auto_insert_metric_name: False
  save_weights_only: False

early_stopping:
  monitor: "val/loss"
  patience: 1000
  mode: "min"

model_summary:
  max_depth: -1
