defaults:
  - speech_val_audio
  - model_checkpoint
  - early_stopping
  - model_summary
  - rich_progress_bar
  - _self_

model_checkpoint:
  dirpath: ${paths.output_dir}/ckpts
  filename: "model_{epoch:03d}"
  # Select checkpoints by minimizing validation loss.
  monitor: "val/loss"
  mode: "min"
  # Keep the single best checkpoint by monitored metric.
  save_top_k: 1
  # Also keep a rolling checkpoint of the current epoch as ``last.ckpt``.
  save_last: true
  every_n_epochs: 1
  auto_insert_metric_name: false
  save_weights_only: false

early_stopping:
  monitor: "val/loss"
  patience: 1000
  mode: "min"

model_summary:
  max_depth: -1
